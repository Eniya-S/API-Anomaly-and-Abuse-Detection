<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Change Password</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>🔒 Change Password</h1>

    <p>Update your account password</p>

    <br>

    {% if message %}
        <h3 style="color:green;">
            {{ message }}
        </h3>
        <br>
    {% endif %}

    <form action="/change-password" method="POST">

        <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required>

        <br><br>

        <input
            type="password"
            name="old_password"
            placeholder="Enter Old Password"
            required>

        <br><br>

        <input
            type="password"
            name="new_password"
            placeholder="Enter New Password"
            required>

        <br><br>

        <button type="submit">
            Update Password
        </button>

    </form>

    <br>

    <a href="/login">
        <button>
            Back to Login
        </button>
    </a>

    <a href="/">
        <button>
            Home
        </button>
    </a>

</div>

</body>

</html>
