<!DOCTYPE html>
<html>

<head>

<title>API Testing Service</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>


<body>


<div class="container">


<h1>🧪 API Testing Service</h1>


{% if message %}

<h3 style="color:green;">
{{message}}
</h3>

{% endif %}



<form method="POST">


<input 
type="text"
name="api_name"
placeholder="Enter API Name"
required>


<br><br>


<select name="test_type">

<option>
Performance Testing
</option>

<option>
Security Testing
</option>

<option>
Load Testing
</option>

<option>
Response Testing
</option>


</select>


<br><br>


<input
type="number"
name="request_count"
placeholder="Number of Requests"
required>


<br><br>


<button type="submit">
Start API Test
</button>


</form>


<br>


<a href="/dashboard">
<button>Dashboard</button>
</a>


</div>


</body>

</html>
