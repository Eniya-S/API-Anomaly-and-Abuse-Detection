<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Create Account</h1>

    <form action="/signup" method="POST">

        <input type="text"
               name="username"
               placeholder="Enter Username"
               required>

        <br><br>

        <input type="email"
               name="email"
               placeholder="Enter Email"
               required>

        <br><br>

        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>

        <br><br>

        <button type="submit">Signup</button>

    </form>

    <br>

    <a href="/">
        <button>Home</button>
    </a>

    <a href="/login">
        <button>Login</button>
    </a>

</div>

</body>
</html>
